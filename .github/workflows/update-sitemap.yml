name: MiFRM Sitemap - Otomatik Uret ve Yayinla

on:
  schedule:
    # Gunde 3 kez: sabah / ogle / aksam (Turkiye saati, UTC+3)
    # 06:00 TR = 03:00 UTC | 12:00 TR = 09:00 UTC | 18:00 TR = 15:00 UTC
    - cron: "0 3 * * *"    # sabah 06:00 (TR)
    - cron: "0 9 * * *"    # ogle 12:00 (TR)
    - cron: "0 15 * * *"   # aksam 18:00 (TR)
  workflow_dispatch: {}    # Actions sekmesinden manuel tetikleme
  push:
    branches: [ "main" ]
    paths:
      - "scripts/**"
      - ".github/workflows/update-sitemap.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu checkout et
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bagimliliklari yukle
        run: pip install -r scripts/requirements.txt

      - name: Yayin klasorunu hazirla (repodaki TUM statik dosyalar dahil)
        run: |
          mkdir -p site
          # .git, .github ve scripts disindaki her seyi (tema css/js, google
          # dogrulama dosyasi, robots.txt, CNAME, xsl'ler, vb.) kopyala.
          # Yeni bir statik dosya eklerseniz otomatik dahil olur, tek tek
          # isim yazmaya gerek kalmaz.
          shopt -s extglob dotglob
          for item in !(.git|.github|scripts|site); do
            cp -r "$item" site/ 2>/dev/null || true
          done

      - name: Sitemap uret (Blogger RSS -> WordPress uyumlu XML)
        working-directory: site
        run: python ../scripts/generate_sitemap.py

      - name: Uretilen dosyalari dogrula (sifir hata garantisi)
        working-directory: site
        run: |
          set -e
          test -f sitemap.xml || { echo "HATA: sitemap.xml uretilmedi"; exit 1; }
          python -c "import xml.etree.ElementTree as ET, glob, sys
          files = glob.glob('*.xml')
          assert files, 'Hic XML dosyasi bulunamadi'
          for f in files:
              try:
                  ET.parse(f)
                  print(f'OK  -> {f}')
              except ET.ParseError as e:
                  print(f'BOZUK XML -> {f}: {e}')
                  sys.exit(1)
          "

      - name: Pages artifact yukle
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages'e deploy et
        id: deployment
        uses: actions/deploy-pages@v4
